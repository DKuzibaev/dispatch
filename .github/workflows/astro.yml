name: Build and Deploy Astro

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Make Astro executable (если нужно)
        run: chmod +x ./node_modules/.bin/astro

      - name: Build site
        run: npm run build   # или npx astro build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4