name: Deploy Astro to GitHub Pages

on:
  push:
    branches:
      - main  # или твоя основная ветка

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci

      # 4. Синхронизируем коллекции контента
      - name: Sync Astro content
        run: npx astro sync

      # 5. Собираем сайт
      - name: Build Astro site
        run: npx astro build

      # 6. Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Это автоматически создаст gh-pages ветку и зальет туда dist