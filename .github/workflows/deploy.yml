name: Build and Deploy Astro in main

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # чтобы push сработал

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync Astro content
        run: npx astro sync

      - name: Build Astro site
        run: npx astro build

      - name: Copy dist files to root
        run: |
          rm -rf ./public/* ./!(.git)
          cp -r dist/* .
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Deploy built site" || echo "No changes to commit"
          git push origin main